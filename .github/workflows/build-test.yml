name: Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  be-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-backend

    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: bun install
        
      - name: Generate
        run: bun generate
        
      - name: Lint
        run: bun lint
        
      - name: Build Binary
        run: bun build:binary