name: mocavis-be

services:
  mocavis-be-database:
    container_name: mocavis-postgres
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_PORT}:5432
    expose:
      - ${POSTGRES_PORT}
    volumes:
      - ./docker/volumes/:/var/lib/postgresql/data
    networks:
      - mocavis-network

  mocavis-be-redis:
    image: redis:latest
    container_name: mocavis-redis
    ports:
      - ${REDIS_PORT}:6379
    expose:
      - ${REDIS_PORT}
    restart: always
    volumes:
      - ./conf/redis.conf:/etc/redis/redis.conf
    networks:
      - mocavis-network

  mocavis-rstp:
    image: livekit/livekit-server:latest
    container_name: mocavis-livekit-server
    network_mode: "host"
    command: --config /etc/livekit.yaml
    restart: always
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_KEYS}
      - LIVEKIT_RTC_NODE_IP=${LIVEKIT_NODE_IP}
      - LIVEKIT_RTC_USE_EXTERNAL_IP=${LIVEKIT_USE_EXTERNAL_IP}

      # Turn Server Configuration
      - LIVEKIT_TURN_ENABLED=${LIVEKIT_TURN_ENABLED}
      - LIVEKIT_TURN_DOMAIN=${LIVEKIT_TURN_DOMAIN}
      - LIVEKIT_TURN_TLS_PORT=${LIVEKIT_TURN_TLS_PORT}
      - LIVEKIT_TURN_UDP_PORT=${LIVEKIT_TURN_UDP_PORT}
      - LIVEKIT_TURN_CERT_FILE=${LIVEKIT_TURN_CERT_FILE}
      - LIVEKIT_TURN_KEY_FILE=${LIVEKIT_TURN_KEY_FILE}
    volumes:
      - ./livekit-conf/${LIVEKIT_YAML_FILE}:/etc/livekit.yaml
      - ${LIVEKIT_LETSENCRYPT_FOLDER}:/etc/letsencrypt:ro

volumes:
  postgres:

networks:
  mocavis-network:
    driver: bridge